name: Generate Daily Hand

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate daily hand
        run: python generate_hand.py

      - name: Commit and push daily_hand.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_hand.json
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "chore: daily hand $(date -u +%Y-%m-%d)"
          git push
